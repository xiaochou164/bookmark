<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rainboard Sync</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      width: 380px;
      color: #1a1a2e;
      max-height: 580px;
      overflow-y: auto;
      overflow-x: hidden;
      background: #f4f6fb;
    }

    .popup-header {
      background: linear-gradient(135deg, #1194ff 0%, #0062cc 100%);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .popup-logo {
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .popup-header-text strong {
      color: #fff;
      font-size: 14px;
      display: block;
    }

    .popup-header-text small {
      color: rgba(255, 255, 255, 0.75);
      font-size: 11px;
    }

    .section {
      padding: 10px 14px;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 6px;
      text-align: left;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn[disabled] {
      opacity: 0.5;
      cursor: wait;
    }

    .btn-primary {
      background: #1194ff;
      color: #fff;
    }

    .btn-primary:hover:not([disabled]) {
      background: #0d80e6;
    }

    .btn-accent {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: #fff;
    }

    .btn-accent:hover:not([disabled]) {
      opacity: 0.9;
    }

    .btn-ghost {
      background: #fff;
      color: #444;
      border: 1px solid #e0e4ef;
    }

    .btn-ghost:hover:not([disabled]) {
      background: #f0f4ff;
    }

    .btn-icon {
      font-size: 15px;
      width: 22px;
      flex-shrink: 0;
      text-align: center;
    }

    .btn-label {
      flex: 1;
    }

    .btn-sub {
      font-size: 10px;
      opacity: 0.75;
      font-weight: 400;
      display: block;
      margin-top: 1px;
    }

    .status-box {
      background: #fff;
      border: 1px solid #e0e4ef;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11.5px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 160px;
      overflow-y: auto;
      color: #444;
    }

    .status-box.ok {
      border-color: #b7f7d0;
      background: #f0fdf4;
      color: #166534;
    }

    .status-box.error {
      border-color: #fecaca;
      background: #fff5f5;
      color: #b91c1c;
    }

    .status-box.info {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1e40af;
    }

    .divider {
      height: 1px;
      background: #e8eaf0;
      margin: 2px 14px;
    }

    .footer {
      padding: 8px 14px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      color: #1194ff;
      text-decoration: none;
      font-size: 11.5px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(17, 148, 255, 0.1);
      color: #1194ff;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 10.5px;
      font-weight: 600;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
    }

    #statusBox {
      display: none;
    }

    #statusBox.visible {
      display: block;
    }
  </style>
</head>

<body>
  <div class="popup-header">
    <div class="popup-logo">☂</div>
    <div class="popup-header-text">
      <strong>Rainboard Sync</strong>
      <small>Chrome 书签 · Raindrop · 云书签</small>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Chrome ↔ 云书签（Rainboard）</div>
    <button id="rbPreviewBtn" class="btn btn-ghost">
      <span class="btn-icon">🔍</span>
      <span class="btn-label">
        预览变更
        <span class="btn-sub">查看差异，不写入</span>
      </span>
    </button>
    <button id="rbSyncBtn" class="btn btn-accent">
      <span class="btn-icon">🔄</span>
      <span class="btn-label">
        云书签双向同步
        <span class="btn-sub">Chrome ↔ Rainboard 数据库</span>
      </span>
    </button>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Chrome ↔ Raindrop</div>
    <button id="previewBtn" class="btn btn-ghost">
      <span class="btn-icon">👁</span>
      <span class="btn-label">
        预览（Dry Run）
        <span class="btn-sub">仅分析，不执行</span>
      </span>
    </button>
    <button id="syncBtn" class="btn btn-primary">
      <span class="btn-icon">⚡</span>
      <span class="btn-label">
        立即同步 Raindrop
        <span class="btn-sub">Chrome ↔ Raindrop 双向</span>
      </span>
    </button>
  </div>

  <div class="section" id="statusSection">
    <div id="statusBox" class="status-box"></div>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <span class="badge"><span class="badge-dot"></span>已连接</span>
    <a href="#" id="openOptions">⚙ 插件设置</a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
