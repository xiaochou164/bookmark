name = "rainboard"
main = "src/worker.mjs"
compatibility_date = "2026-02-26"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"

[[r2_buckets]]
binding = "OBJECTS"
bucket_name = "rainboard-objects"
preview_bucket_name = "rainboard-objects-preview"

[[queues.producers]]
binding = "TASK_QUEUE"
queue = "rainboard-tasks"

[[queues.producers]]
binding = "TASK_DLQ"
queue = "rainboard-tasks-dlq"

[[queues.consumers]]
queue = "rainboard-tasks"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "rainboard-tasks-dlq"

[triggers]
crons = ["*/15 * * * *"]

# 可执行：npm run cf:d1:create（会自动创建/复用 D1，并写入实际 [[d1_databases]] 配置）
# 下方保留的是注释模板；脚本会在文件末尾追加或更新可用配置块
# [[d1_databases]]
# binding = "DB"
# database_name = "rainboard"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[[d1_databases]]
binding = "DB"
database_name = "rainboard"
database_id = "ace7a94b-abff-4ee7-9894-630b3c0d6df8"
